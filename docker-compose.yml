version: '3.8'

# Local development compose — mirrors the Railway single-service setup.
# The API serves both the REST endpoints and the built React frontend.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: deltax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deltax
      POSTGRES_PASSWORD: deltax_dev_password
      POSTGRES_DB: deltax_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API + Frontend (single service)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deltax-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://deltax:deltax_dev_password@postgres:5432/deltax_db
      - JWT_SECRET=local_dev_jwt_secret_change_me
      - JWT_REFRESH_SECRET=local_dev_refresh_secret_change_me
      - CORS_ORIGIN=http://localhost:3001

volumes:
  postgres_data: