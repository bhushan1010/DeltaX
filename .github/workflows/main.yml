name: LeadFlow Pro CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Backend Setup & Test
    - name: Install API Dependencies
      working-directory: ./apps/api
      run: npm ci || npm install

    - name: Build API
      working-directory: ./apps/api
      run: npm run build --if-present

    # Frontend Setup & Test
    - name: Install Web Dependencies
      working-directory: ./apps/web
      run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Build Web
      working-directory: ./apps/web
      run: npm run build || (echo "Build failed, showing directory structure:" && find . -type f -name "*.js" -o -name "*.mjs" && exit 1)

    - name: Verify Build Output
      working-directory: ./apps/web
      run: ls -la dist/

  docker-build:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push API Image
      uses: docker/build-push-action@v4
      with:
        context: ./apps/api
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-api:latest
        
    - name: Build and push Web Image
      uses: docker/build-push-action@v4
      with:
        context: ./apps/web
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/leadflow-web:latest